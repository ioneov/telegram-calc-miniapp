<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#f7f7f7">
  <title>Калькуляторы</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <nav class="modern-tabs">
      <button type="button" class="tab-item active" id="tab-calories-btn" data-tab="calories">
        <div class="tab-icon-card">
          <img src="kkal-svg.svg" alt="Калории" />
        </div>
      </button>

      <button type="button" class="tab-item" id="tab-running-btn" data-tab="running">
        <div class="tab-icon-card">
          <img src="run-svg.svg" alt="Бег" />
        </div>
      </button>
    </nav>

    <section id="tab-calories" class="tab-panel active">
      <div class="calc-card">
        <section class="form-side">
          <form id="calorie-form" class="form-stack">
            <div class="fields-grid">
              <label>
                <span class="field-label">Пол</span>
                <select id="sex">
                  <option value="male">Мужчина</option>
                  <option value="female">Женщина</option>
                </select>
              </label>
              <label>
                <span class="field-label">Возраст</span>
                <input id="age" type="number" placeholder="25" />
              </label>
              <label>
                <span class="field-label">Рост, см</span>
                <input id="height" type="number" placeholder="175" />
              </label>
              <label>
                <span class="field-label">Вес, кг</span>
                <input id="weight" type="number" step="0.1" placeholder="70" />
              </label>
              <label class="full-width">
                <span class="field-label">Активность</span>
                <select id="activity">
                  <option value="1.2">Минимальная</option>
                  <option value="1.375">Низкая (1-3 трен.)</option>
                  <option value="1.55" selected>Средняя (3-5 трен.)</option>
                  <option value="1.725">Высокая (6-7 трен.)</option>
                  <option value="1.9">Очень высокая</option>
                </select>
              </label>
            </div>
          </form>
          <div id="error-box" class="error-box hidden">
            <p id="error-text"></p>
          </div>
        </section>

        <section id="result" class="result-banner">
          <h2 class="banner-title">Суточная норма</h2>
          <div class="metrics-grid">
            <div class="metric-item">
              <span class="m-label">BMR</span>
              <span class="m-value" id="bmr-value">-</span>
            </div>
            <div class="metric-item">
              <span class="m-label">Поддержание</span>
              <span class="m-value" id="maintain-value">-</span>
            </div>
            <div class="metric-item accent-cut">
              <span class="m-label">Сброс (-15%)</span>
              <span class="m-value" id="cut-value">-</span>
            </div>
            <div class="metric-item accent-bulk">
              <span class="m-label">Набор (+15%)</span>
              <span class="m-value" id="bulk-value">-</span>
            </div>
          </div>
        </section>

        <section class="macros-card">
          <div class="macro-slicers">
            <button type="button" class="macro-slicer" data-macro-tab="cut">Сброс</button>
            <button type="button" class="macro-slicer active" data-macro-tab="maintain">Норма</button>
            <button type="button" class="macro-slicer" data-macro-tab="bulk">Набор</button>
          </div>

          <div class="macros-display">
            <div id="macros-warning" class="macros-warning hidden">⚠️ Мало углеводов!</div>
            
            <div class="macro-panel" id="macro-panel-cut">
              <div class="macro-grid">
                <div class="macro-col"><span>Белки</span><strong id="cut-protein">-</strong></div>
                <div class="macro-col"><span>Жиры</span><strong id="cut-fat">-</strong></div>
                <div class="macro-col"><span>Угл.</span><strong id="cut-carbs">-</strong></div>
              </div>
            </div>

            <div class="macro-panel active" id="macro-panel-maintain">
              <div class="macro-grid">
                <div class="macro-col"><span>Белки</span><strong id="maintain-protein">-</strong></div>
                <div class="macro-col"><span>Жиры</span><strong id="maintain-fat">-</strong></div>
                <div class="macro-col"><span>Угл.</span><strong id="maintain-carbs">-</strong></div>
              </div>
            </div>

            <div class="macro-panel" id="macro-panel-bulk">
              <div class="macro-grid">
                <div class="macro-col"><span>Белки</span><strong id="bulk-protein">-</strong></div>
                <div class="macro-col"><span>Жиры</span><strong id="bulk-fat">-</strong></div>
                <div class="macro-col"><span>Угл.</span><strong id="bulk-carbs">-</strong></div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </section>

    <section id="tab-running" class="tab-panel">
      <div class="calc-card">
        <section class="form-side">
          <form id="running-form" class="form-stack">
            <div class="run-input-group">
              <span class="field-label">Время бега</span>
              <div class="hms-grid">
                <input id="run-hours" type="number" value="0" /><span class="u">ч</span>
                <input id="run-minutes" type="number" value="0" /><span class="u">м</span>
                <input id="run-seconds" type="number" value="0" /><span class="u">с</span>
              </div>
            </div>
            <div class="run-input-group">
              <span class="field-label">Дистанция</span>
              <div class="dist-grid">
                <input id="run-km" type="number" value="0" /><span class="u">км</span>
                <input id="run-meters" type="number" value="0" /><span class="u">м</span>
              </div>
            </div>
          </form>
        </section>

        <section class="result-banner running-res">
          <div class="metrics-grid">
            <div class="metric-item">
              <span class="m-label">Темп (мин/км)</span>
              <span class="m-value" id="pace-value">-</span>
            </div>
            <div class="metric-item">
              <span class="m-label">Скорость (км/ч)</span>
              <span class="m-value" id="speed-value">-</span>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
