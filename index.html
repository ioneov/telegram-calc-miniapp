<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Суточная норма калорий</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Суточная норма калорий</h1>
    <p class="subtitle">Расчёт по формуле Харриса–Бенедикта</p>

    <form id="calorie-form" class="card">
      <label>
        Пол
        <select id="sex" required>
          <option value="male">Мужчина</option>
          <option value="female">Женщина</option>
        </select>
      </label>

      <label>
        Возраст
        <input id="age" type="number" min="1" max="120" required />
      </label>

      <label>
        Рост, см
        <input id="height" type="number" min="50" max="250" required />
      </label>

      <label>
        Вес, кг
        <input id="weight" type="number" min="20" max="400" step="0.1" required />
      </label>

      <label>
        Активность
        <select id="activity" required>
          <option value="1.2">Минимальная (сидячий образ жизни)</option>
          <option value="1.375">Низкая (1–3 тренировки в неделю)</option>
          <option value="1.55" selected>Средняя (3–5 тренировок в неделю)</option>
          <option value="1.725">Высокая (6–7 тренировок в неделю)</option>
          <option value="1.9">Очень высокая (спорт/физический труд ежедневно)</option>
        </select>
      </label>

      <button type="submit">Рассчитать</button>
    </form>

    <section id="result" class="card result hidden">
      <h2>Результат</h2>
      <p><strong>Базовый обмен (BMR):</strong> <span id="bmr-value">—</span> ккал</p>
      <p><strong>Суточная норма калорий:</strong> <span id="calories-value">—</span> ккал</p>
      <p class="note">Результат является ориентировочной оценкой.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
